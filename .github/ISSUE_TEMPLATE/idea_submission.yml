name: Idea Submission
description: Submit an idea for a new feature or enhancement
title: '[Idea]: '
labels: ['type: idea']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting an idea! This project follows an **ideas-only contribution model**.

        **How it works:**
        - You submit ideas (like this one)
        - Maintainers review and triage your submission
        - **AI agents implement all code** - we do not accept code contributions from the community
        - Once implemented, changes go through review and get merged

        Please fill out the form below to help us understand your idea.

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which area of protoMaker does this idea relate to?
      options:
        - UI/UX (User Interface)
        - Agent/AI
        - Kanban Board
        - Git/Worktree Management
        - Project Management
        - Settings/Configuration
        - Documentation
        - Performance
        - Other
      default: 0
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to your workflow?
      options:
        - Nice to have
        - Would improve my workflow
        - Critical for my use case
      default: 0
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does this idea solve? What pain point are you experiencing?
      placeholder: A clear and concise description of what the problem is. Ex. I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see. Focus on WHAT you want, not HOW to implement it.
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
      placeholder: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Describe specific scenarios where this feature would be useful.
      placeholder: |
        1. When working on...
        2. As a user who needs to...
        3. In situations where...
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups/Screenshots
      description: If applicable, add mockups, wireframes, or screenshots to help illustrate your idea.
      placeholder: Drag and drop images here or paste image URLs
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, references, or examples about your idea here.
      placeholder: Any additional information that might be helpful...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this idea hasn't been submitted already
          required: true
        - label: I understand this is an ideas-only project and I am not submitting code
          required: true
        - label: I have provided a clear description of the problem and proposed solution
          required: true
