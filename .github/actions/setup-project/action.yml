name: 'Setup Project'
description: 'Common setup steps for CI workflows - checkout, Node.js, dependencies, and native modules'

inputs:
  node-version-file:
    description: 'Path to .nvmrc file for Node.js version'
    required: false
    default: '.nvmrc'
  check-lockfile:
    description: 'Run lockfile lint check for SSH URLs'
    required: false
    default: 'false'
  rebuild-node-pty-path:
    description: 'Working directory for node-pty rebuild (empty = root)'
    required: false
    default: ''
  skip-native-rebuild:
    description: 'Skip native module rebuilds (for lightweight jobs like lint/audit)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Check for SSH URLs in lockfile
      if: inputs.check-lockfile == 'true'
      shell: bash
      run: npm run lint:lockfile

    - name: Configure Git for HTTPS
      shell: bash
      # Convert SSH URLs to HTTPS for git dependencies (e.g., @electron/node-gyp)
      # Use a per-workspace config file to avoid .gitconfig.lock races when
      # multiple self-hosted runners share the same $HOME directory.
      run: |
        GIT_CONF="${RUNNER_TEMP:-.}/.gitconfig-ci"
        git config -f "$GIT_CONF" url."https://github.com/".insteadOf "git@github.com:"
        echo "GIT_CONFIG_GLOBAL=$GIT_CONF" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      # Use npm install instead of npm ci to correctly resolve platform-specific
      # optional dependencies (e.g., @tailwindcss/oxide, lightningcss binaries)
      # Skip scripts to avoid electron-builder install-app-deps which uses too much memory
      # Use --force to allow platform-specific dev dependencies like dmg-license on non-darwin platforms
      run: npm install --ignore-scripts --force

    - name: Install build tools (Linux)
      if: inputs.skip-native-rebuild != 'true' && runner.os == 'Linux'
      shell: bash
      # Ensure make, gcc, and python3 are present for node-gyp native rebuilds.
      # Some self-hosted runners (e.g. Proxmox LXC) ship without build-essential.
      run: |
        if ! command -v make &>/dev/null; then
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential python3-dev
        fi

    - name: Install Linux native bindings
      if: inputs.skip-native-rebuild != 'true'
      shell: bash
      # Workaround for npm optional dependencies bug (npm/cli#4828)
      # Explicitly install Linux bindings needed for build tools
      run: |
        npm install --no-save --force --ignore-scripts \
          @rollup/rollup-linux-x64-gnu@4.53.3 \
          @tailwindcss/oxide-linux-x64-gnu@4.1.17

    - name: Cache Turborepo
      uses: actions/cache@v4
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-

    - name: Build shared packages
      shell: bash
      # Build shared packages (types, utils, platform, etc.) before apps can use them
      run: npm run build:packages

    - name: Install native build tools
      if: inputs.skip-native-rebuild != 'true' && runner.os == 'Linux'
      shell: bash
      # Ensure make/g++ are available for node-gyp native compilation.
      # Some self-hosted runner containers (especially lightweight ones) omit
      # build-essential. node-pty falls back to compiling from source when
      # prebuilds are missing, which requires make.
      run: |
        if ! command -v make &>/dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends build-essential
        fi

    - name: Rebuild native modules (root)
      if: inputs.skip-native-rebuild != 'true' && inputs.rebuild-node-pty-path == ''
      shell: bash
      # Rebuild node-pty and other native modules for Electron
      run: npm rebuild node-pty

    - name: Rebuild native modules (workspace)
      if: inputs.skip-native-rebuild != 'true' && inputs.rebuild-node-pty-path != ''
      shell: bash
      # Rebuild node-pty and other native modules needed for server
      run: npm rebuild node-pty
      working-directory: ${{ inputs.rebuild-node-pty-path }}
