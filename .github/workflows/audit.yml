# SECURITY: This workflow is hardened against fork PR attacks. See docs/security/ci-hardening.md
name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: namespace-profile-protolabs-linux
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies (skip scripts for speed)
        run: npm install --ignore-scripts --force

      - name: Run security audit
        id: audit
        run: |
          # Run audit and capture JSON output for annotation reporting
          set +e
          npm audit --audit-level=high --json > audit-output.json 2>&1
          AUDIT_EXIT=$?
          set -e

          # Parse and emit GitHub annotations for high/critical vulnerabilities
          if [ -f audit-output.json ]; then
            node - <<'EOF'
          const fs = require('fs');
          const raw = fs.readFileSync('audit-output.json', 'utf8');
          let report;
          try {
            report = JSON.parse(raw);
          } catch {
            // Non-JSON output (e.g. npm 6 style) — skip annotation step
            process.exit(0);
          }

          const vulns = report.vulnerabilities || {};
          const severities = ['high', 'critical'];

          for (const [name, vuln] of Object.entries(vulns)) {
            const sev = vuln.severity || 'unknown';
            if (!severities.includes(sev)) continue;

            const via = Array.isArray(vuln.via)
              ? vuln.via
                  .filter(v => typeof v === 'object')
                  .map(v => v.title || v.url || '')
                  .filter(Boolean)
                  .join('; ')
              : '';

            const fixAvailable = vuln.fixAvailable
              ? typeof vuln.fixAvailable === 'object'
                ? `Fix available: npm audit fix (${vuln.fixAvailable.name}@${vuln.fixAvailable.version})`
                : 'Fix available: npm audit fix'
              : 'No automatic fix available';

            const msg = [
              `[${sev.toUpperCase()}] ${name}`,
              via ? `Advisory: ${via}` : null,
              fixAvailable,
            ]
              .filter(Boolean)
              .join(' | ');

            // Emit as a GitHub Actions error annotation so it surfaces on the PR
            const level = sev === 'critical' ? 'error' : 'warning';
            console.log(`::${level}::${msg}`);
          }
          EOF
          fi

          # Fail the step if audit found high/critical issues
          exit $AUDIT_EXIT
