# SECURITY: This workflow is hardened against fork PR attacks. See docs/security/ci-hardening.md
name: Auto Release

# Fires when a staging→main PR is merged. Cuts a version bump commit, pushes a
# v* tag, and creates a GitHub Release. The tag push triggers build-electron.yml.
#
# NOTE: To allow the v* tag push to trigger build-electron.yml, this workflow
# must use a PAT (stored as GH_PAT secret) rather than the default GITHUB_TOKEN.
# GitHub blocks cross-workflow event chains when using GITHUB_TOKEN to prevent
# infinite loops. If GH_PAT is not set, the tag push will succeed but
# build-electron.yml will not fire automatically.

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  release:
    runs-on: self-hosted
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'staging' &&
       github.repository == 'protoLabsAI/protoMaker')
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      DISCORD_DEV_WEBHOOK: ${{ secrets.DISCORD_DEV_WEBHOOK }}
      DISCORD_ALERTS_WEBHOOK: ${{ secrets.DISCORD_ALERTS_WEBHOOK }}

    steps:
      - name: Verify GH_PAT is set
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "WARNING: GH_PAT secret is not set."
            echo "The v* tag push will fall back to GITHUB_TOKEN."
            echo "build-electron.yml will NOT fire automatically."
            echo "Set GH_PAT in repository secrets to enable the release → Electron build chain."
          else
            echo "GH_PAT is configured — release → Electron build chain is active."
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # Use a PAT so that the v* tag push triggers build-electron.yml.
          # Falls back to GITHUB_TOKEN if GH_PAT is not configured (tag push
          # will succeed but won't trigger downstream workflows).
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          skip-native-rebuild: 'true'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clean stale changesets
        # Remove any leftover changeset files that reference renamed/deleted packages,
        # which would cause changeset:version to fail.
        run: find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -delete

      - name: Generate changeset
        # Analyzes conventional commits since the last tag and writes
        # .changeset/release-{id}.md with the bump type and summary.
        run: npm run release:prepare

      - name: Apply version bump
        # Bumps all @protolabsai/* packages in lockstep and writes CHANGELOG.md.
        # Then syncs workspace root, server, and ui to the same version so the
        # git tag always reflects the product version (not a stale 0.x.0 root).
        run: |
          npm run changeset:version
          LIB_VERSION=$(node -p "require('./libs/types/package.json').version")
          npm version "$LIB_VERSION" --no-git-tag-version --allow-same-version
          npm version "$LIB_VERSION" -w apps/server --no-git-tag-version --allow-same-version
          npm version "$LIB_VERSION" -w apps/ui --no-git-tag-version --allow-same-version
          node -e "const f='packages/mcp-server/plugins/automaker/.claude-plugin/plugin.json';const p=JSON.parse(require('fs').readFileSync(f));p.version='$LIB_VERSION';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"

      - name: Get new version
        id: version
        # Read from a changeset-managed lib so the tag tracks the lib version.
        run: echo "version=$(node -p "require('./libs/types/package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "chore: release v${{ steps.version.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin main
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          # Generate notes, then filter out chore PRs (unless they're the only entries)
          RAW_NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$VERSION" --jq '.body')

          # Extract "What's Changed" lines (PR entries start with "* ")
          ALL_LINES=$(echo "$RAW_NOTES" | grep '^\* ' || true)
          NON_CHORE=$(echo "$ALL_LINES" | grep -vi '^\* chore' || true)

          if [ -n "$NON_CHORE" ]; then
            # Has real changes — filter out chores
            FILTERED_NOTES=$(echo "$RAW_NOTES" | grep -vi '^\* chore')
          else
            # Only chores — keep them so the release isn't empty
            FILTERED_NOTES="$RAW_NOTES"
          fi

          gh release create "$VERSION" \
            --title "$VERSION Alpha" \
            --notes "$FILTERED_NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync version bump back to staging and dev
        # The version bump commit lands on main. Sync it back so staging and dev
        # stay consistent. Opens PRs main→staging and main→dev and auto-merges them.
        # Uses GH_PAT so the merge push triggers deploy-staging.yml (GITHUB_TOKEN
        # pushes are suppressed by GitHub's anti-recursion guard).
        # Both PRs use --merge to preserve the DAG (same rule as promotion PRs).
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          sync_branch() {
            local TARGET="$1"
            echo "--- Syncing main → ${TARGET} ---"

            PR_URL=$(gh pr create \
              --title "chore: sync ${VERSION} version bump → ${TARGET}" \
              --body "Auto-sync of ${VERSION} release commit from main → ${TARGET}." \
              --base "${TARGET}" \
              --head main 2>&1)
            CREATE_EXIT=$?

            if [ $CREATE_EXIT -ne 0 ]; then
              # PR already exists is OK, anything else is a real error
              if echo "$PR_URL" | grep -q "already exists"; then
                echo "PR already exists for main → ${TARGET}, skipping"
                return 0
              fi
              echo "ERROR: Failed to create sync PR for ${TARGET}:"
              echo "$PR_URL"
              return 1
            fi

            echo "Created: $PR_URL"
            PR_NUM=$(echo "$PR_URL" | grep -oP '(?<=/pull/)\d+' | head -1)
            if [ -n "$PR_NUM" ]; then
              gh pr merge "$PR_NUM" --merge --auto || true
              echo "Enabled auto-merge for #${PR_NUM}"
            fi
          }

          sync_branch "staging"
          sync_branch "dev"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Wait for sync PRs to merge
        # The sync PRs must land before the next promotion or version conflicts
        # will block staging→main and dev→staging PRs. Wait up to 5 minutes.
        run: |
          for TARGET in staging dev; do
            PR_NUM=$(gh pr list --base "$TARGET" --head main --state open \
              --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$PR_NUM" ]; then
              echo "No open sync PR for main → ${TARGET}, skipping"
              continue
            fi
            echo "Waiting for sync PR #${PR_NUM} (main → ${TARGET}) to merge..."
            for i in $(seq 1 30); do
              STATE=$(gh pr view "$PR_NUM" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$STATE" = "MERGED" ]; then
                echo "PR #${PR_NUM} merged."
                break
              fi
              if [ "$STATE" = "CLOSED" ]; then
                echo "PR #${PR_NUM} was closed without merge — manual sync needed."
                break
              fi
              echo "  Attempt ${i}/30 — state: ${STATE}, waiting 10s..."
              sleep 10
            done
            if [ "$STATE" != "MERGED" ] && [ "$STATE" != "CLOSED" ]; then
              echo "WARNING: Sync PR #${PR_NUM} did not merge within 5 minutes."
              echo "The next promotion may hit version conflicts."
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Rewrite and post release notes to Discord
        if: ${{ env.DISCORD_DEV_WEBHOOK != '' }}
        continue-on-error: true
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          node scripts/rewrite-release-notes.mjs "$VERSION" "$PREV_TAG" --post-discord
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Alert on release failure
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="ALERT: Auto-release FAILED. Version bump or tag push may be incomplete. ${RUN_URL}"
          if [ -n "${DISCORD_ALERTS_WEBHOOK:-}" ]; then
            curl -sf -H "Content-Type: application/json" \
              -d "{\"content\": \"${MSG}\"}" \
              "$DISCORD_ALERTS_WEBHOOK" || true
          fi
