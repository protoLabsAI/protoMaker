# Async-parallel code review via @protolabsai/release-tools `review-code`.
#
# Runs alongside CodeRabbit on every PR to main. Findings post as a single
# sticky PR comment when the run completes. Non-blocking: review-code failures
# or timeouts do not block the PR.
#
# Why this tool: release-tools `review-code` is a Clawpatch-inspired review
# harness that talks to our LiteLLM gateway via the standard /v1/chat/completions
# endpoint. The original Clawpatch CLI is bound to OpenAI's Codex provider,
# which assumes WebSocket transport + first-party OpenAI invariants the
# gateway can't honor (#3614). `review-code` doesn't have that coupling.
#
# Auth: GH Actions secrets, mirrored from the Infisical `secret-management`
# project. `OPENAI_API_KEY` is set from `GATEWAY_API_KEY`, `OPENAI_BASE_URL`
# from `GATEWAY_BASE_URL` with `/v1` appended.

name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: code-review-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '22'

      - name: Initialize review state
        run: npx --yes -p github:protoLabsAI/release-tools review-code init

      - name: Map features
        run: npx --yes -p github:protoLabsAI/release-tools review-code map

      - name: Run review against PR diff
        id: review
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}/v1
          CODE_REVIEW_TIMEOUT_MS: '300000'
        run: |
          set -o pipefail
          npx --yes -p github:protoLabsAI/release-tools review-code run --all 2>&1 | tee /tmp/review-run.log
          findings=$(grep -oE 'findings=[0-9]+' /tmp/review-run.log | tail -1 | cut -d= -f2)
          echo "findings=${findings:-0}" >> "$GITHUB_OUTPUT"

      - name: Build markdown report
        id: report
        if: always()
        run: |
          npx --yes -p github:protoLabsAI/release-tools review-code report --output /tmp/review.md 2>&1 | tee /tmp/report.log || true
          if [ -f /tmp/review.md ]; then
            echo "report_path=/tmp/review.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Post findings as PR comment
        if: always() && steps.report.outputs.report_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPORT_PATH: ${{ steps.report.outputs.report_path }}
          FINDINGS_COUNT: ${{ steps.review.outputs.findings }}
        run: node scripts/post-review-findings.mjs

      - name: Append findings to step summary
        if: always() && steps.report.outputs.report_path != ''
        run: |
          {
            echo "## Code Review — ${{ steps.review.outputs.findings }} finding(s)"
            echo
            cat "${{ steps.report.outputs.report_path }}"
          } >> "$GITHUB_STEP_SUMMARY"
