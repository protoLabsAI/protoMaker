name: Create Protolab Tests

on:
  pull_request:
    branches:
      - '*'
    paths:
      - 'packages/create-protolab/**'
      - '.github/workflows/create-protolab-test.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'packages/create-protolab/**'
      - '.github/workflows/create-protolab-test.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test with Node ${{ matrix.node }} and ${{ matrix.package-manager }}
    runs-on: namespace-profile-protolabs-linux

    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
        package-manager: [npm, pnpm]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}

      - name: Setup pnpm
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - name: Setup yarn
        if: matrix.package-manager == 'yarn'
        run: npm install -g yarn

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

      - name: Setup npm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: matrix.package-manager == 'npm'
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ matrix.node }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-npm-

      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: matrix.package-manager == 'pnpm'
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-node-${{ matrix.node }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-pnpm-

      - name: Setup yarn cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: matrix.package-manager == 'yarn'
        with:
          path: ~/.yarn/cache
          key: ${{ runner.os }}-node-${{ matrix.node }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-yarn-

      - name: Install root dependencies
        run: npm install

      - name: Install create-protolab dependencies
        working-directory: packages/create-protolab
        run: npm install

      - name: Build create-protolab
        working-directory: packages/create-protolab
        run: npm run build

      - name: Run unit tests
        working-directory: packages/create-protolab
        run: npm test
        env:
          NODE_ENV: test

      - name: Test npm pack
        working-directory: packages/create-protolab
        shell: bash
        run: |
          PACK_FILE=$(npm pack)
          echo "PACK_FILE=$PACK_FILE" >> $GITHUB_ENV
          echo "Created package: $PACK_FILE"

      - name: Test fixture - Simple Node (npm)
        if: matrix.package-manager == 'npm'
        shell: bash
        working-directory: packages/create-protolab/tests/fixtures/simple-node
        run: |
          echo "Testing simple-node fixture with npm"
          npm install
          npm test

      - name: Test fixture - Monorepo (pnpm)
        if: matrix.package-manager == 'pnpm'
        shell: bash
        working-directory: packages/create-protolab/tests/fixtures/monorepo-pnpm
        run: |
          echo "Testing monorepo-pnpm fixture with pnpm"
          pnpm install
          pnpm test

      - name: Test fixture - TypeScript Project (npm)
        if: matrix.package-manager == 'npm'
        shell: bash
        working-directory: packages/create-protolab/tests/fixtures/typescript-project
        run: |
          echo "Testing typescript-project fixture with npm"
          npm install
          npm test

      - name: Test fixture - Next.js App (npm)
        if: matrix.package-manager == 'npm'
        shell: bash
        working-directory: packages/create-protolab/tests/fixtures/nextjs-app
        run: |
          echo "Testing nextjs-app fixture with npm"
          npm test

      - name: Verify module exports
        working-directory: packages/create-protolab
        shell: bash
        run: |
          node -e "
          import('./dist/index.js').then(m => {
            const exports = ['researchRepo', 'analyzeGaps', 'generateProposal', 'init', 'setupCI'];
            const missing = exports.filter(e => typeof m[e] !== 'function');
            if (missing.length > 0) {
              throw new Error('Missing exports: ' + missing.join(', '));
            }
            console.log('✓ All expected exports found:', exports.join(', '));
          }).catch(err => {
            console.error('Error:', err);
            process.exit(1);
          });
          "

      - name: Verify CLI entry point
        working-directory: packages/create-protolab
        shell: bash
        run: |
          # Verify CLI file exists
          if [ ! -f dist/cli.js ]; then
            echo "Error: dist/cli.js not found"
            exit 1
          fi

          # Verify it has the shebang
          head -1 dist/cli.js | grep -q "#!/usr/bin/env node" || {
            echo "Error: dist/cli.js missing shebang"
            exit 1
          }

          echo "✓ CLI entry point valid"

      - name: Verify template files
        working-directory: packages/create-protolab
        shell: bash
        run: |
          # Verify templates directory exists in dist
          if [ ! -d dist/templates ]; then
            echo "Error: dist/templates/ directory not found"
            exit 1
          fi

          # Verify key template files exist
          TEMPLATE_COUNT=$(find dist/templates -type f | wc -l | tr -d ' ')
          if [ "$TEMPLATE_COUNT" -lt 5 ]; then
            echo "Error: Expected at least 5 template files, found $TEMPLATE_COUNT"
            exit 1
          fi

          echo "✓ Found $TEMPLATE_COUNT template files in dist/templates/"

  summary:
    name: Test Summary
    runs-on: namespace-profile-protolabs-linux
    needs: test
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All tests passed successfully!"
