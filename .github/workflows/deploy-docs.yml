# Deploy docs site to Cloudflare Pages via Wrangler CLI.
#
# Triggers on docs/** changes pushed to main.
# PR pushes get a preview deployment with URL posted as a comment.
# Production branch = main.
#
# Required secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: namespace-profile-protolabs-linux
    if: github.repository == 'protoLabsAI/protoMaker'
    timeout-minutes: 10
    concurrency:
      group: docs-deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Build docs
        run: |
          npm ci --ignore-scripts
          # Install platform-specific binaries that --ignore-scripts skips
          npm install --ignore-scripts --no-save \
            @rollup/rollup-linux-x64-gnu@$(node -p "require('./node_modules/rollup/package.json').version") \
            @esbuild/linux-x64@$(node -p "require('./node_modules/vitepress/node_modules/esbuild/package.json').version")
          npm run docs:build

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass the commit message through the environment, never interpolate it
          # directly into the shell — a message containing backticks / $() / ;
          # would otherwise break the script or allow command injection in a job
          # that holds CLOUDFLARE_API_TOKEN.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Deploy' }}
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          npx wrangler pages deploy docs/.vitepress/dist \
            --project-name=protolabs-docs \
            --branch="$BRANCH" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${COMMIT_MESSAGE:-Deploy}"

      - name: Comment PR preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const slug = branch.replace(/[^a-z0-9-]/gi, '-').substring(0, 28);
            const url = `https://${slug}.protolabs-docs.pages.dev`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Docs preview: ${url}`
            });

      - name: Notify Discord
        if: always() && github.event_name == 'push'
        run: |
          STATUS="${{ job.status }}"
          COMMIT="${GITHUB_SHA:0:8}"
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$STATUS" = "success" ]; then
            MSG="Docs deployed (${BRANCH}): \`${COMMIT}\` — https://docs.protolabs.studio"
          else
            MSG="Docs deploy FAILED (${BRANCH}): \`${COMMIT}\` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          if [ -n "${DISCORD_DEPLOY_WEBHOOK:-}" ]; then
            curl -sf -H "Content-Type: application/json" \
              -d "{\"content\": \"${MSG}\"}" \
              "$DISCORD_DEPLOY_WEBHOOK" || true
          fi
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
