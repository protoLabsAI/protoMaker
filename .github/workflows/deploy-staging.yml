# SECURITY: This workflow is hardened against fork PR attacks. See docs/security/ci-hardening.md
name: Deploy Staging

on:
  push:
    branches:
      - staging
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'site/**'
      - 'designs/**'
      - '.automaker/**'
  workflow_dispatch:

permissions: read-all

jobs:
  deploy:
    runs-on: [self-hosted, staging]
    if: github.repository == 'protoLabsAI/protoMaker'
    timeout-minutes: 60
    concurrency:
      group: staging-deploy
      cancel-in-progress: false

    # Default working directory for all steps — the runner's _work/ dir
    # gets wiped by cron every 5min, so use /tmp as a safe fallback.
    defaults:
      run:
        working-directory: /tmp

    # Use a persistent deploy directory that survives the runner's workspace
    # cleanup cron. The default _work/ directory gets wiped every 5min.
    # Paths use $HOME so they work for any runner user without hardcoded PII.

    steps:
      - name: Setup persistent deploy directory
        env:
          GH_TOKEN: ${{ github.token }}
          INFISICAL_MACHINE_IDENTITY_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          export DEPLOY_DIR="$HOME/staging-deploy/automaker"
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Create deploy dir if first run
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            mkdir -p "$(dirname "$DEPLOY_DIR")"
            git clone "$REPO_URL" "$DEPLOY_DIR"
          fi

          # Pull latest code (update remote URL in case token changed)
          cd "$DEPLOY_DIR"
          git remote set-url origin "$REPO_URL"
          git fetch origin staging
          git reset --hard origin/staging

          # Ensure Infisical CLI is available (install if missing)
          if ! command -v infisical &>/dev/null; then
            curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' \
              | sudo -E bash
            sudo apt-get install -y infisical
          fi

          # Pull secrets from Infisical (replaces .env.staging plaintext file)
          infisical export \
            --domain https://secrets.proto-labs.ai/api \
            --env staging \
            --format dotenv \
            --silent \
            > "$DEPLOY_DIR/.env"
          echo "Loaded $(wc -l < "$DEPLOY_DIR/.env") secrets from Infisical"

      - name: Disk space pre-check
        run: |
          # Prune dangling images to free space before checking
          docker image prune -f 2>/dev/null || true

          # Require at least 10GB free on the deploy partition
          AVAIL_KB=$(df -k "$DEPLOY_DIR" | awk 'NR==2 {print $4}')
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          echo "Available disk space: ${AVAIL_GB}GB (${AVAIL_KB}KB)"

          MIN_GB=10
          if [ "$AVAIL_GB" -lt "$MIN_GB" ]; then
            echo "WARN: Only ${AVAIL_GB}GB free — running aggressive Docker cleanup"
            # Remove all unused images (not just dangling), build cache, and unused volumes
            docker system prune -af --volumes 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            # Re-check after cleanup
            AVAIL_KB=$(df -k "$DEPLOY_DIR" | awk 'NR==2 {print $4}')
            AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
            echo "After cleanup: ${AVAIL_GB}GB free"

            if [ "$AVAIL_GB" -lt "$MIN_GB" ]; then
              echo "ERROR: Still only ${AVAIL_GB}GB free after cleanup — need at least ${MIN_GB}GB"
              df -h "$DEPLOY_DIR"
              exit 1
            fi
          fi
          echo "Disk space OK: ${AVAIL_GB}GB free (minimum ${MIN_GB}GB)"

      - name: Record deployment start
        run: |
          AUTOMAKER_API_KEY=$(grep -oP 'AUTOMAKER_API_KEY=\K.*' "$DEPLOY_DIR/.env" || echo "")
          echo "::add-mask::$AUTOMAKER_API_KEY"
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:8}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RESPONSE=$(curl -sf -X POST http://localhost:3008/api/deploy/start \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $AUTOMAKER_API_KEY" \
            -d "{\"environment\":\"staging\",\"commitSha\":\"${COMMIT}\",\"commitShort\":\"${COMMIT_SHORT}\",\"runId\":\"${{ github.run_id }}\",\"runUrl\":\"${RUN_URL}\"}" \
            --max-time 10 2>/dev/null || echo "")
          if [ -n "$RESPONSE" ]; then
            DEPLOYMENT_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deployment',{}).get('id',''))" 2>/dev/null || echo "")
            echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> "$GITHUB_ENV"
            echo "Deployment tracking started: $DEPLOYMENT_ID"
          else
            echo "Deployment tracking skipped (server not running)"
          fi

      - name: Drain running agents
        run: |
          # Gracefully stop auto-mode and wait for agents to finish.
          # Uses the API key from .env (same machine as staging server).
          AUTOMAKER_API_KEY=$(grep -oP 'AUTOMAKER_API_KEY=\K.*' "$DEPLOY_DIR/.env" || echo "")
          echo "::add-mask::$AUTOMAKER_API_KEY"
          curl -sf -X POST http://localhost:3008/api/deploy/drain \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $AUTOMAKER_API_KEY" \
            --max-time 180 || echo "Drain skipped (server not running or no agents)"

      - name: Tag rollback images
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          # Save current working images so we can restore on failure.
          # Only tag app services — docs runs independently and is never rolled back.
          for svc in server ui; do
            img=$(docker compose -f docker-compose.staging.yml images -q "$svc" 2>/dev/null | head -1 || true)
            if [ -n "$img" ]; then
              docker tag "$img" "automaker-staging-${svc}:rollback"
              echo "Tagged ${svc} image ${img} as rollback"
            else
              echo "No existing ${svc} image to tag (first deploy?)"
            fi
          done

      - name: Rebuild and restart staging
        id: rebuild
        working-directory: ${{ env.DEPLOY_DIR }}
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
          # Plain progress streams full build output to CI logs (BuildKit TUI hides errors by default)
          BUILDKIT_PROGRESS: plain
        run: |
          set -euo pipefail

          echo "=== Pre-flight checks ==="
          echo "DEPLOY_DIR: ${DEPLOY_DIR}"
          echo "Working directory: $(pwd)"
          echo "Git HEAD: $(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"

          # Verify compose file exists
          if [ ! -f "docker-compose.staging.yml" ]; then
            echo "::error::docker-compose.staging.yml not found at $(pwd)"
            ls -la
            exit 1
          fi
          echo "Compose file: OK"

          # Verify Dockerfile exists
          if [ ! -f "Dockerfile" ]; then
            echo "::error::Dockerfile not found at $(pwd)"
            ls -la
            exit 1
          fi
          echo "Dockerfile: OK"

          # Validate compose file syntax before attempting build
          if ! docker compose -f docker-compose.staging.yml config --quiet 2>&1; then
            echo "::error::docker-compose.staging.yml failed syntax validation"
            docker compose -f docker-compose.staging.yml config 2>&1 || true
            exit 1
          fi
          echo "Compose syntax: OK"

          # Check required secrets are configured in .env
          # Warn only — missing keys cause runtime failures, not build failures
          ENV_FILE="${DEPLOY_DIR}/.env"
          for key in ANTHROPIC_API_KEY AUTOMAKER_API_KEY GH_TOKEN; do
            val=$(grep -oP "${key}=\K[^\n]*" "$ENV_FILE" 2>/dev/null | head -1 || echo "")
            if [ -z "$val" ]; then
              echo "WARN: ${key} not set in .env — staging agents may not function"
            else
              echo "OK: ${key} is configured"
            fi
          done

          echo ""
          echo "=== Build stage ==="
          if ! ./scripts/setup-staging.sh --build; then
            echo "::error::Image build failed"
            echo "=== Container build logs (last 100 lines) ==="
            docker compose -f docker-compose.staging.yml logs --tail=100 2>/dev/null || true
            echo "=== Docker build cache/disk info ==="
            docker system df 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "=== Start stage ==="
          if ! ./scripts/setup-staging.sh --start; then
            echo "::error::Service start failed"
            echo "=== Container logs (last 100 lines per service) ==="
            docker compose -f docker-compose.staging.yml logs --tail=100 2>/dev/null || true
            echo "=== Container status ==="
            docker compose -f docker-compose.staging.yml ps 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "=== Post-start container check ==="
          docker compose -f docker-compose.staging.yml ps

          # Detect immediate container crash — setup-staging.sh --start exits 0 even on health
          # check timeout, so we must inspect the container state directly
          SERVER_STATUS=$(docker inspect automaker-server --format='{{.State.Status}}' 2>/dev/null || echo "unknown")
          echo "Server container status: ${SERVER_STATUS}"
          if [ "$SERVER_STATUS" = "exited" ]; then
            echo "::error::Server container exited immediately after start"
            echo "=== Server container logs ==="
            docker compose -f docker-compose.staging.yml logs --tail=100 server 2>/dev/null || true
            echo "=== Server container inspect ==="
            docker inspect automaker-server --format='ExitCode={{.State.ExitCode}} Error={{.State.Error}}' 2>/dev/null || true
            exit 1
          fi

      - name: Verify deployment
        id: verify
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          # Check server readiness (verifies API key, data dir, service init)
          retries=0
          while [ $retries -lt 15 ]; do
            if curl -sf http://localhost:3008/api/health/ready > /dev/null; then
              echo "Server is ready"
              curl -sf http://localhost:3008/api/health/ready
              break
            fi
            retries=$((retries + 1))
            sleep 2
          done
          if [ $retries -eq 15 ]; then
            echo "Server readiness check failed after 30s"
            docker compose -f docker-compose.staging.yml logs --tail=50 server

            # Check if server container has exhausted restart attempts
            SERVER_STATUS=$(docker inspect automaker-server --format='{{.State.Status}}' 2>/dev/null || echo "unknown")
            SERVER_RESTART_COUNT=$(docker inspect automaker-server --format='{{.RestartCount}}' 2>/dev/null || echo "0")

            if [ "$SERVER_STATUS" = "exited" ] && [ "$SERVER_RESTART_COUNT" -ge 5 ]; then
              echo "ALERT: Server container exhausted restart attempts (count: $SERVER_RESTART_COUNT)"
              # Signal restart exhaustion for Discord notification
              echo "RESTART_EXHAUSTED=true" >> "$GITHUB_ENV"
            fi

            exit 1
          fi

      - name: Smoke tests
        id: smoke
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          # Source API key from .env (same machine as staging server)
          export AUTOMAKER_API_KEY=$(grep -oP 'AUTOMAKER_API_KEY=\K.*' .env || echo "")
          echo "::add-mask::$AUTOMAKER_API_KEY"
          ./scripts/smoke-test.sh http://localhost:3008
        env:
          DISCORD_ALERTS_WEBHOOK: ${{ secrets.DISCORD_ALERTS_WEBHOOK }}

      - name: Configure LiteLLM gateway settings
        if: success()
        run: |
          # Read key from Infisical .env — strip single quotes produced by dotenv format
          LITELLM_KEY=$(grep -oP "LITELLM_MASTER_KEY=\K.*" "$DEPLOY_DIR/.env" | tr -d "'" || echo "")
          AUTOMAKER_API_KEY=$(grep -oP "AUTOMAKER_API_KEY=\K.*" "$DEPLOY_DIR/.env" | tr -d "'" || echo "")
          echo "::add-mask::$LITELLM_KEY"
          echo "::add-mask::$AUTOMAKER_API_KEY"
          if [ -n "$LITELLM_KEY" ]; then
            curl -sf -X PUT http://localhost:3008/api/settings/global \
              -H "Content-Type: application/json" \
              -H "X-API-Key: $AUTOMAKER_API_KEY" \
              -d "{\"litellmGateway\":{\"enabled\":true,\"baseUrl\":\"http://ava:4000\",\"apiKeySource\":\"inline\",\"apiKey\":\"${LITELLM_KEY}\",\"autoDiscoverModels\":true,\"modelPrefix\":\"litellm/\"}}" \
              --max-time 10 && echo "LiteLLM gateway configured" || echo "WARN: LiteLLM gateway config skipped (server may not expose settings endpoint)"
          else
            echo "WARN: LITELLM_MASTER_KEY not found in .env — skipping gateway config"
          fi

      - name: Record deployment success
        if: success()
        run: |
          AUTOMAKER_API_KEY=$(grep -oP 'AUTOMAKER_API_KEY=\K.*' "$DEPLOY_DIR/.env" | tr -d "'" || echo "")
          echo "::add-mask::$AUTOMAKER_API_KEY"
          DEPLOYMENT_ID="${DEPLOYMENT_ID:-}"
          if [ -n "$DEPLOYMENT_ID" ]; then
            VERSION=$(curl -sf http://localhost:3008/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unknown'))" 2>/dev/null || echo "unknown")
            curl -sf -X POST http://localhost:3008/api/deploy/complete \
              -H "Content-Type: application/json" \
              -H "X-API-Key: $AUTOMAKER_API_KEY" \
              -d "{\"deploymentId\":\"${DEPLOYMENT_ID}\",\"status\":\"succeeded\",\"version\":\"${VERSION}\"}" \
              --max-time 10 || echo "Deploy completion recording skipped"
          fi

      - name: Rollback on failure
        id: rollback
        if: failure() && (steps.rebuild.outcome == 'failure' || steps.verify.outcome == 'failure' || steps.smoke.outcome == 'failure')
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "Deploy verification failed — rolling back app services (docs runs independently)"

          # Check if rollback images exist for app services
          has_rollback=false
          for svc in server ui; do
            if docker image inspect "automaker-staging-${svc}:rollback" &>/dev/null; then
              has_rollback=true
              break
            fi
          done

          if [ "$has_rollback" = "false" ]; then
            echo "No rollback images available (first deploy?) — cannot rollback"
            exit 1
          fi

          # Stop broken app containers only — docs is untouched
          docker compose -f docker-compose.staging.yml down 2>/dev/null || true

          # Retag rollback images as latest and collect which services to start
          ROLLBACK_SERVICES=""
          for svc in server ui; do
            if docker image inspect "automaker-staging-${svc}:rollback" &>/dev/null; then
              docker tag "automaker-staging-${svc}:rollback" "automaker-staging-${svc}:latest"
              ROLLBACK_SERVICES="$ROLLBACK_SERVICES $svc"
              echo "Restored ${svc} from rollback"
            else
              echo "No rollback image for ${svc} — skipping"
            fi
          done

          # Restart only app services that have rollback images
          docker compose -f docker-compose.staging.yml up -d $ROLLBACK_SERVICES

          # Verify rollback readiness
          retries=0
          while [ $retries -lt 15 ]; do
            if curl -sf http://localhost:3008/api/health/ready > /dev/null; then
              echo "Rollback successful — server is ready"
              break
            fi
            retries=$((retries + 1))
            sleep 2
          done
          if [ $retries -eq 15 ]; then
            echo "CRITICAL: Rollback also failed. Manual intervention required."
            docker compose -f docker-compose.staging.yml logs --tail=50 server
            exit 1
          fi

          # Record deployment failure (server may be back up after rollback)
          DEPLOYMENT_ID="${DEPLOYMENT_ID:-}"
          if [ -n "$DEPLOYMENT_ID" ]; then
            AUTOMAKER_API_KEY=$(grep -oP 'AUTOMAKER_API_KEY=\K.*' "$DEPLOY_DIR/.env" || echo "")
            echo "::add-mask::$AUTOMAKER_API_KEY"
            curl -sf -X POST http://localhost:3008/api/deploy/complete \
              -H "Content-Type: application/json" \
              -H "X-API-Key: $AUTOMAKER_API_KEY" \
              -d "{\"deploymentId\":\"${DEPLOYMENT_ID}\",\"status\":\"rolled_back\",\"rolledBack\":true,\"error\":\"Deploy verification failed, rolled back\"}" \
              --max-time 10 || echo "Deploy failure recording skipped"
          fi

      - name: Cleanup
        if: always()
        run: |
          # Remove rollback tags (keep images for layer cache)
          for svc in server ui; do
            docker rmi "automaker-staging-${svc}:rollback" 2>/dev/null || true
          done
          docker image prune -f 2>/dev/null || true

      - name: Notify Discord
        if: always()
        run: |
          VERSION=$(curl -sf http://localhost:3008/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unknown'))" 2>/dev/null || echo "unknown")
          COMMIT="${{ github.sha }}"
          COMMIT="${COMMIT:0:8}"
          STATUS="${{ job.status }}"

          ROLLBACK_OUTCOME="${{ steps.rollback.outcome }}"
          RESTART_EXHAUSTED="${RESTART_EXHAUSTED:-false}"

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            MSG="Staging deployed: \`${COMMIT}\` (v${VERSION}) - all healthy"
            WEBHOOK="${DISCORD_DEPLOY_WEBHOOK:-}"
          else
            case "$ROLLBACK_OUTCOME" in
              success)
                MSG="ALERT: Staging deploy FAILED: \`${COMMIT}\` - rolled back to previous version. ${RUN_URL}"
                ;;
              failure)
                MSG="ALERT: Staging deploy FAILED: \`${COMMIT}\` - rollback FAILED. Manual intervention required. ${RUN_URL}"
                ;;
              *)
                MSG="ALERT: Staging deploy FAILED: \`${COMMIT}\` - no rollback performed. ${RUN_URL}"
                ;;
            esac

            # Add restart exhaustion alert if detected
            if [ "$RESTART_EXHAUSTED" = "true" ]; then
              MSG="${MSG}\n**CRITICAL**: Server container exhausted restart attempts (5/5). Manual restart required."
            fi
            WEBHOOK="${DISCORD_ALERTS_WEBHOOK:-}"
          fi

          # Post to the appropriate Discord channel
          if [ -n "${WEBHOOK:-}" ]; then
            curl -sf -H "Content-Type: application/json" \
              -d "{\"content\": \"${MSG}\"}" \
              "$WEBHOOK" || true
          fi

          echo "$MSG"
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          DISCORD_ALERTS_WEBHOOK: ${{ secrets.DISCORD_ALERTS_WEBHOOK }}
