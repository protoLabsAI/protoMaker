name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    if: github.repository == 'proto-labs-ai/automaker'
    timeout-minutes: 15
    concurrency:
      group: staging-deploy
      cancel-in-progress: true

    # Default working directory for all steps — the runner's _work/ dir
    # gets wiped by cron every 5min, so use /tmp as a safe fallback.
    defaults:
      run:
        working-directory: /tmp

    # Use a persistent deploy directory that survives the runner's workspace
    # cleanup cron. The default _work/ directory gets wiped every 5min.
    env:
      DEPLOY_DIR: /home/josh/staging-deploy/automaker
      ENV_SOURCE: /home/josh/dev/ava/.env

    steps:
      - name: Setup persistent deploy directory
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Create deploy dir if first run
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            mkdir -p "$(dirname "$DEPLOY_DIR")"
            git clone "$REPO_URL" "$DEPLOY_DIR"
          fi

          # Pull latest code (update remote URL in case token changed)
          cd "$DEPLOY_DIR"
          git remote set-url origin "$REPO_URL"
          git fetch origin main
          git reset --hard origin/main

          # Copy .env from persistent config
          if [ -f "$ENV_SOURCE" ]; then
            cp "$ENV_SOURCE" "$DEPLOY_DIR/.env"
            echo "Copied .env from $ENV_SOURCE"
          else
            echo "ERROR: No .env found at $ENV_SOURCE"
            exit 1
          fi

      - name: Drain running agents
        run: |
          # Gracefully stop auto-mode and wait for agents to finish.
          # Uses the API key from .env (same machine as staging server).
          AUTOMAKER_API_KEY=$(grep -oP 'AUTOMAKER_API_KEY=\K.*' "$ENV_SOURCE" || echo "")
          curl -sf -X POST http://localhost:3008/api/deploy/drain \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $AUTOMAKER_API_KEY" \
            --max-time 180 || echo "Drain skipped (server not running or no agents)"

      - name: Tag rollback images
        working-directory: /home/josh/staging-deploy/automaker
        run: |
          # Save current working images so we can restore on failure.
          # If no images exist yet (first deploy), this is a no-op.
          for svc in server ui docs storybook; do
            img=$(docker compose -f docker-compose.staging.yml images -q "$svc" 2>/dev/null || true)
            if [ -n "$img" ]; then
              docker tag "$img" "automaker-staging-${svc}:rollback"
              echo "Tagged ${svc} image ${img} as rollback"
            else
              echo "No existing ${svc} image to tag (first deploy?)"
            fi
          done

      - name: Rebuild and restart staging
        id: rebuild
        working-directory: /home/josh/staging-deploy/automaker
        run: |
          # setup-staging.sh --build isolates storybook from critical services.
          # If storybook fails to build, the script continues (non-fatal).
          ./scripts/setup-staging.sh --build
          ./scripts/setup-staging.sh --start

      - name: Verify deployment
        id: verify
        working-directory: /home/josh/staging-deploy/automaker
        run: |
          # Check server health
          retries=0
          while [ $retries -lt 15 ]; do
            if curl -sf http://localhost:3008/api/health > /dev/null; then
              echo "Server is healthy"
              curl -sf http://localhost:3008/api/health
              break
            fi
            retries=$((retries + 1))
            sleep 2
          done
          if [ $retries -eq 15 ]; then
            echo "Server health check failed after 30s"
            docker compose -f docker-compose.staging.yml logs --tail=50 server
            exit 1
          fi

          # Check docs health
          retries=0
          while [ $retries -lt 10 ]; do
            if curl -sf http://localhost:3009/ > /dev/null; then
              echo "Docs site is healthy"
              break
            fi
            retries=$((retries + 1))
            sleep 2
          done
          if [ $retries -eq 10 ]; then
            echo "Docs health check failed after 20s"
            docker compose -f docker-compose.staging.yml logs --tail=20 docs
            # Non-fatal — docs failure shouldn't block the deploy
          fi

          # Check storybook health
          retries=0
          while [ $retries -lt 10 ]; do
            if curl -sf http://localhost:${STORYBOOK_PORT:-6666}/ > /dev/null; then
              echo "Storybook is healthy"
              break
            fi
            retries=$((retries + 1))
            sleep 2
          done
          if [ $retries -eq 10 ]; then
            echo "Storybook health check failed after 20s"
            docker compose -f docker-compose.staging.yml logs --tail=20 storybook
            # Non-fatal — storybook failure shouldn't block the deploy
          fi

      - name: Smoke tests
        id: smoke
        working-directory: /home/josh/staging-deploy/automaker
        run: |
          # Source API key from .env (same machine as staging server)
          export AUTOMAKER_API_KEY=$(grep -oP 'AUTOMAKER_API_KEY=\K.*' .env || echo "")
          ./scripts/smoke-test.sh http://localhost:3008
        env:
          DISCORD_ALERTS_WEBHOOK: ${{ secrets.DISCORD_ALERTS_WEBHOOK }}

      - name: Rollback on failure
        id: rollback
        if: failure() && (steps.rebuild.outcome == 'failure' || steps.verify.outcome == 'failure' || steps.smoke.outcome == 'failure')
        working-directory: /home/josh/staging-deploy/automaker
        run: |
          echo "Deploy verification failed — rolling back to previous images"

          # Check if rollback images exist for critical services
          has_rollback=false
          for svc in server ui docs; do
            if docker image inspect "automaker-staging-${svc}:rollback" &>/dev/null; then
              has_rollback=true
              break
            fi
          done

          if [ "$has_rollback" = "false" ]; then
            echo "No rollback images available (first deploy?) — cannot rollback"
            exit 1
          fi

          # Stop broken containers
          docker compose -f docker-compose.staging.yml down 2>/dev/null || true

          # Retag rollback images as latest and collect which services to start
          # Critical services first, storybook is best-effort
          ROLLBACK_SERVICES=""
          for svc in server ui docs storybook; do
            if docker image inspect "automaker-staging-${svc}:rollback" &>/dev/null; then
              docker tag "automaker-staging-${svc}:rollback" "automaker-staging-${svc}:latest"
              ROLLBACK_SERVICES="$ROLLBACK_SERVICES $svc"
              echo "Restored ${svc} from rollback"
            else
              echo "No rollback image for ${svc} — skipping"
            fi
          done

          # Restart only services that have rollback images
          docker compose -f docker-compose.staging.yml up -d $ROLLBACK_SERVICES

          # Verify rollback health
          retries=0
          while [ $retries -lt 15 ]; do
            if curl -sf http://localhost:3008/api/health > /dev/null; then
              echo "Rollback successful — server is healthy"
              break
            fi
            retries=$((retries + 1))
            sleep 2
          done
          if [ $retries -eq 15 ]; then
            echo "CRITICAL: Rollback also failed. Manual intervention required."
            docker compose -f docker-compose.staging.yml logs --tail=50 server
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          # Remove rollback tags (keep images for layer cache)
          for svc in server ui docs storybook; do
            docker rmi "automaker-staging-${svc}:rollback" 2>/dev/null || true
          done
          docker image prune -f 2>/dev/null || true

      - name: Notify Discord
        if: always()
        run: |
          VERSION=$(curl -sf http://localhost:3008/api/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unknown'))" 2>/dev/null || echo "unknown")
          COMMIT="${{ github.sha }}"
          COMMIT="${COMMIT:0:8}"
          STATUS="${{ job.status }}"

          DOCS_STATUS=$(curl -sf http://localhost:3009/ > /dev/null 2>&1 && echo "docs ok" || echo "docs down")
          SB_STATUS=$(curl -sf http://localhost:${STORYBOOK_PORT:-6666}/ > /dev/null 2>&1 && echo "storybook ok" || echo "storybook down")

          ROLLBACK_OUTCOME="${{ steps.rollback.outcome }}"

          if [ "$STATUS" = "success" ]; then
            MSG="Staging deployed: \`${COMMIT}\` (v${VERSION}) - all healthy (${DOCS_STATUS}, ${SB_STATUS})"
          else
            case "$ROLLBACK_OUTCOME" in
              success)
                MSG="Staging deploy FAILED: \`${COMMIT}\` - rolled back to previous version. Check GitHub Actions."
                ;;
              failure)
                MSG="Staging deploy FAILED: \`${COMMIT}\` - rollback FAILED. Manual intervention required."
                ;;
              *)
                MSG="Staging deploy FAILED: \`${COMMIT}\` - no rollback performed. Check GitHub Actions."
                ;;
            esac
          fi

          # Post to #deployments channel via webhook if configured
          if [ -n "${DISCORD_DEPLOY_WEBHOOK:-}" ]; then
            curl -sf -H "Content-Type: application/json" \
              -d "{\"content\": \"${MSG}\"}" \
              "$DISCORD_DEPLOY_WEBHOOK" || true
          fi

          echo "$MSG"
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
