name: Format Check

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main
      - master

jobs:
  format:
    runs-on: self-hosted

    steps:
      - name: Clean stale workspace files
        run: git clean -ffdx 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --ignore-scripts --force

      - name: Check formatting
        run: npm run format:check
