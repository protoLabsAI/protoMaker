name: Regenerate Site Data

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6am UTC
  workflow_dispatch: {} # Manual trigger

jobs:
  regenerate:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm run stats:generate

      - name: Commit and create PR if data changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/ site/changelog/ site/roadmap/
          if git diff --cached --quiet; then
            echo "No changes to site data — skipping."
            exit 0
          fi
          BRANCH="chore/regenerate-site-data-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "docs: regenerate site data [skip ci]"
          git push origin "$BRANCH"
          # Create PR if one doesn't already exist for today
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then
            gh pr create --base dev --head "$BRANCH" \
              --title "docs: regenerate site data" \
              --body "Automated daily site data regeneration (stats, changelog, roadmap)."
            gh pr merge --auto --squash
          fi

      - name: Push data to protolabs.studio repo
        env:
          SITE_DEPLOY_KEY: ${{ secrets.SITE_DEPLOY_KEY }}
        if: env.SITE_DEPLOY_KEY != ''
        run: |
          # Set up SSH key for cross-repo push
          mkdir -p ~/.ssh
          echo "$SITE_DEPLOY_KEY" > ~/.ssh/site_deploy_key
          chmod 600 ~/.ssh/site_deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/site_deploy_key -o StrictHostKeyChecking=no"

          # Clone the site repo
          SITE_DIR=$(mktemp -d)
          git clone --depth 1 git@github.com:protoLabsAI/protolabs.studio.git "$SITE_DIR"

          # Copy updated data and images
          cp site/data/stats.json "$SITE_DIR/data/"
          cp site/data/changelog.json "$SITE_DIR/data/"
          cp site/data/roadmap.json "$SITE_DIR/data/"
          cp site/images/og-*.png "$SITE_DIR/public/images/" 2>/dev/null || true

          # Commit and push if changed
          cd "$SITE_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ public/images/
          if git diff --cached --quiet; then
            echo "No changes to site repo — skipping."
          else
            git commit -m "docs: update site data from automaker [skip ci]"
            git push origin main
          fi

          # Cleanup
          rm -rf "$SITE_DIR" ~/.ssh/site_deploy_key
