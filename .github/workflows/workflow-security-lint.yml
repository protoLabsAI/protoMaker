# SECURITY: lints .github/workflows/ for the CWE-94 script-injection class
# (untrusted ${{ ... }} in run blocks), unpinned actions, and over-broad tokens.
# Motivated by #3812 (a real CWE-94 hole) and fleet guardrail #3819.
name: Workflow Security Lint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-security-lint:
    runs-on: namespace-profile-protolabs-linux
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      # zizmor — GitHub Actions security linter. Installed from PyPI (no
      # third-party action to pin) at an exact version for reproducibility.
      # --min-severity=high fails the build on script injection and unpinned
      # actions; medium-severity hardening (artipacked, excessive-permissions)
      # is tracked separately before tightening the gate.
      - name: Install zizmor
        run: pip install zizmor==1.25.2

      - name: Run zizmor
        run: zizmor --min-severity=high .github/workflows/

      # actionlint — workflow syntax, expression typing, and shellcheck. Fetched
      # via the official download script pinned to an immutable commit SHA + an
      # exact actionlint version, so the tooling is deterministic.
      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/62c50a97a146fe36a8951a2a365158c4a4795ba8/scripts/download-actionlint.bash -o /tmp/download-actionlint.bash
          bash /tmp/download-actionlint.bash 1.7.12

      - name: Run actionlint
        run: ./actionlint -color
