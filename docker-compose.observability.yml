version: '3.8'

services:
  alloy:
    image: grafana/alloy:latest
    container_name: automaker-alloy
    restart: unless-stopped
    ports:
      - '4317:4317'
      - '4318:4318'
      - '12345:12345'
    volumes:
      - ./observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    networks:
      - observability
    depends_on:
      - tempo
      - loki
      - mimir

  tempo:
    image: grafana/tempo:latest
    container_name: automaker-tempo
    restart: unless-stopped
    ports:
      - '3200:3200'
    command:
      - -config.file=/etc/tempo/config.yaml
    volumes:
      - tempo-data:/var/tempo
    configs:
      - source: tempo-config
        target: /etc/tempo/config.yaml
    networks:
      - observability
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3200/ready']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  loki:
    image: grafana/loki:3.2.0
    container_name: automaker-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - loki-data:/loki
    configs:
      - source: loki-config
        target: /etc/loki/config.yaml
    networks:
      - observability
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3100/ready']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mimir:
    image: grafana/mimir:latest
    container_name: automaker-mimir
    restart: unless-stopped
    ports:
      - '9009:9009'
    command:
      - -config.file=/etc/mimir/config.yaml
    volumes:
      - mimir-data:/data/mimir
    configs:
      - source: mimir-config
        target: /etc/mimir/config.yaml
    networks:
      - observability
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9009/ready']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  grafana:
    image: grafana/grafana:latest
    container_name: automaker-grafana-otel
    restart: unless-stopped
    ports:
      - '3011:3000'
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-otel-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - observability
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

configs:
  tempo-config:
    content: |
      stream_over_http_enabled: true
      server:
        http_listen_port: 3200
        log_level: info
      query_frontend:
        search:
          duration_slo: 5s
          throughput_bytes_slo: 1.073741824e+09
        trace_by_id:
          duration_slo: 5s
      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
      ingester:
        max_block_duration: 5m
      compactor:
        compaction:
          block_retention: 1h
      metrics_generator:
        registry:
          external_labels:
            source: tempo
            cluster: docker-compose
        storage:
          path: /var/tempo/generator/wal
          remote_write:
            - url: http://mimir:9009/api/v1/push
              send_exemplars: true
      storage:
        trace:
          backend: local
          wal:
            path: /var/tempo/wal
          local:
            path: /var/tempo/blocks
      overrides:
        defaults:
          metrics_generator:
            processors: [service-graphs, span-metrics]

  loki-config:
    content: |
      auth_enabled: false
      server:
        http_listen_port: 3100
        grpc_listen_port: 9096
      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory
      query_range:
        results_cache:
          cache:
            embedded_cache:
              enabled: true
              max_size_mb: 100
      schema_config:
        configs:
          - from: 2020-10-24
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      ruler:
        alertmanager_url: http://localhost:9093

  mimir-config:
    content: |
      multitenancy_enabled: false
      server:
        http_listen_port: 9009
        log_level: info
      blocks_storage:
        backend: filesystem
        bucket_store:
          sync_dir: /data/mimir/tsdb-sync
        filesystem:
          dir: /data/mimir/data/tsdb
        tsdb:
          dir: /data/mimir/tsdb
      compactor:
        data_dir: /data/mimir/compactor
        sharding_ring:
          kvstore:
            store: memberlist
      distributor:
        ring:
          instance_addr: 127.0.0.1
          kvstore:
            store: memberlist
      ingester:
        ring:
          instance_addr: 127.0.0.1
          kvstore:
            store: memberlist
          replication_factor: 1
      ruler_storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir/rules
      store_gateway:
        sharding_ring:
          replication_factor: 1
      activity_tracker:
        filepath: /data/mimir/metrics-activity.log
      memberlist:
        join_members: [mimir]

networks:
  observability:
    name: automaker-observability
    driver: bridge

volumes:
  tempo-data:
    name: automaker-tempo-data
  loki-data:
    name: automaker-loki-data
  mimir-data:
    name: automaker-mimir-data
  grafana-otel-data:
    name: automaker-grafana-otel-data
