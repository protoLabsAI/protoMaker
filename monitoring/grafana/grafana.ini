# Grafana configuration for Automaker monitoring

[server]
protocol = http
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:3010/

[security]
# Admin credentials set via environment variables
# GF_SECURITY_ADMIN_USER and GF_SECURITY_ADMIN_PASSWORD

[auth.anonymous]
# Enable anonymous read-only access for dashboards
enabled = true
org_name = Automaker
org_role = Viewer
hide_version = false

[users]
# Disable user registration
allow_sign_up = false
# Disable org creation by users
allow_org_create = false
# Auto assign new users to default org
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer

[auth]
# Disable login form for anonymous users
disable_login_form = false
disable_signout_menu = false

[dashboards]
# Default home dashboard
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/automaker-overview.json

[log]
mode = console
level = info

[log.console]
format = text

[paths]
provisioning = /etc/grafana/provisioning

[analytics]
reporting_enabled = false
check_for_updates = false

[snapshots]
external_enabled = false

[unified_alerting]
# Enable Grafana unified alerting
enabled = true
# Disable legacy alerting
execute_alerts = false
# Alert state history backend (default is annotations)
state_history_backend = annotations
# Evaluation timeout
evaluation_timeout = 30s
# Max attempts for delivering notifications
max_attempts = 3
