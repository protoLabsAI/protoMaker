# Grafana Alerting Contact Points
# Auto-provisioned on Grafana startup
# Docs: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/

apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord-infra
    receivers:
      - uid: discord-infra-webhook
        type: discord
        settings:
          # Discord webhook URL from environment variable
          # Create this webhook in Discord: Channel Settings > Integrations > Webhooks > New Webhook
          url: ${DISCORD_WEBHOOK_INFRA}
          # Optional: Customize bot name and avatar
          # username: "Grafana Alerts"
          # avatar_url: "https://grafana.com/static/img/grafana_icon.svg"
          # Message template with severity badge and structured content
          message: |
            {{ if eq .Status "firing" }}🔴{{ else }}🟢{{ end }} **{{ .GroupLabels.alertname }}**

            **Severity:** {{ .GroupLabels.severity }}
            **Status:** {{ .Status }}
            **Summary:** {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}

            {{ range .Alerts }}
            **Details:** {{ .Annotations.description }}
            {{ if .DashboardURL }}📊 [View Dashboard]({{ .DashboardURL }}){{ end }}
            {{ if .PanelURL }}📈 [View Panel]({{ .PanelURL }}){{ end }}
            {{ end }}

            🕐 Fired at: {{ .FiringDate }}
          title: 'Automaker Alert: {{ .GroupLabels.alertname }}'
        disableResolveMessage: false

  - orgId: 1
    name: default-email
    receivers:
      - uid: default-email
        type: email
        settings:
          # Fallback email contact point (configured via grafana.ini smtp settings)
          addresses: "admin@localhost"
        disableResolveMessage: false
