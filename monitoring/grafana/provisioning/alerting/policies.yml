# Grafana Alerting Notification Policies
# Auto-provisioned on Grafana startup
# Docs: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/

apiVersion: 1

policies:
  - orgId: 1
    receiver: default-email
    group_by:
      - alertname
      - severity
    group_wait: 10s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts - immediate notification, no batching
      - receiver: discord-infra
        matchers:
          - severity = critical
        group_wait: 0s
        group_interval: 1m
        repeat_interval: 30m
        continue: false

      # Warning alerts - batched every 5 minutes
      - receiver: discord-infra
        matchers:
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 2h
        continue: false

      # Info alerts - batched every 15 minutes
      - receiver: discord-infra
        matchers:
          - severity = info
        group_wait: 1m
        group_interval: 15m
        repeat_interval: 6h
        continue: false

      # Default route for alerts without severity label
      - receiver: discord-infra
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        continue: false
