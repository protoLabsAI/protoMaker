# Prometheus configuration for Automaker monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'automaker-monitor'
    environment: 'development'

# Scrape configurations
scrape_configs:
  # Automaker server metrics
  - job_name: 'automaker-server'
    static_configs:
      - targets: ['host.docker.internal:3008']
        labels:
          service: 'automaker-server'
          component: 'backend'
    metrics_path: '/api/metrics/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Node exporter (host system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          component: 'host'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'
    scrape_interval: 30s
