name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: '{{packageManager}}'

{{packageManagerSetup}}
      - name: Clean node_modules if corrupted
        run: if [ -e node_modules ] && [ ! -d node_modules ]; then rm -f node_modules; fi

      - name: Run security audit
        run: {{auditCommand}}
