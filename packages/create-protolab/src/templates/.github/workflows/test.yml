name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: '{{packageManager}}'

{{packageManagerSetup}}
      - name: Clean node_modules if corrupted
        run: if [ -e node_modules ] && [ ! -d node_modules ]; then rm -f node_modules; fi

      - name: Install dependencies
        run: {{installCommand}}

      - name: Run tests
        run: {{testCommand}}
