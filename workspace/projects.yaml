    github: protoLabsAI/protoWorkstacean
    defaultBranch: master
    status: active
    onboardedAt: '2026-04-06T00:00:00.000Z'
    discord:
      channels:
        general: ''
        updates: ''
        dev: ''

  - slug: protolabsai-protoui
